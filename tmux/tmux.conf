# vim:fileencoding=utf-8:foldmethod=marker

# Keybinds
unbind C-b
bind-key -T root M-i  send-keys ' Mi'
set-option -g prefix M-i
bind-key M-i send-prefix
bind b setw status 
bind v copy-mode
unbind r
bind-key m resize-pane -Z
bind r source-file ~/.config/tmux/tmux.conf
bind-key -r M-g run-shell "/home/user/.local/share/nvim/lazy/harpoon/scripts/tmux/switch-back-to-nvim"

# Tmux sessioniser
bind-key -r M-j run-shell "~/dotfiles/utils/ts.fish"
bind-key -r M-r run-shell "~/dotfiles/utils/select.fish"
bind-key -r M-d run-shell "~/dotfiles/utils/ts.sh ~/dotfiles/"
bind-key -r M-s run-shell "~/dotfiles/utils/ts.sh ~/dotfiles/nvim"
bind-key -r u run-shell "~/dotfiles/utils/ts.sh ~/dotfiles/utils"
bind-key -r M-h run-shell "~/dotfiles/utils/ts.sh ~"
bind-key -r M-p run-shell "~/dotfiles/utils/ts.sh ~/projects/"
bind-key -r M-c run-shell "~/dotfiles/utils/ts.sh ~/.config"
bind-key -r M-n run-shell "~/dotfiles/utils/ts.sh ~/dotfiles/nixos"
bind-key -r M-y run-shell "tmux neww yazi #{pane_current_path}"

# Switch to last
bind-key a last-window
bind-key M-a switch-client -l

# Open new splits at same dir
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'fcsonline/tmux-thumbs'

# Options
set -g detach-on-destroy off
set -g renumber-windows on
set -g base-index 1
set -g status-keys emacs # For command prompt (prefix + :)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set-window-option -g mode-keys vi
set -s set-clipboard on
set -s escape-time 50
# set -s copy-command 'xsel -i' # Not working currently


# RICE {{{

# Default colors
set -gq @thm_bg                           "#222436"
set -gq @thm_fg                           "#c8d3f5"
set -gq @thm_primary                      "#86e1fc"
set -gq @thm_inverse_primary              "#1b1d2b"
set -gq @thm_surface_low                  "#3a3f5a"
set -gq @thm_surface                      "#c099ff"
set -gq @thm_surface_variant              "#ff757f"
set -gq @thm_outline                      "#82aaff"
set -gq @thm_text_variant                 "#444a73"

# Matugen colors
# TODO: use these instead
source ~/.config/tmux/tmux-colors.conf

thm_bg="#222436"
thm_fg="#c8d3f5"
thm_cyan="#86e1fc"
thm_black="#1b1d2b"
thm_gray="#3a3f5a"
thm_magenta="#c099ff"
thm_pink="#ff757f"
thm_red="#ff757f"
thm_green="#c3e88d"
thm_yellow="#ffc777"
thm_blue="#82aaff"
thm_orange="#ff9e64"
thm_black4="#444a73"

# Status bar settings
set -g status "on"
set -g status-bg "${thm_bg}"
set -g status-interval 2
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-justify centre
set -g status-style "fg=${thm_orange},bg=${thm_green}"

# Messages
set -g message-style "fg=${thm_cyan},bg=${thm_gray},align=centre"
set -g message-command-style "fg=${thm_cyan},bg=${thm_gray},align=centre"

# Panes
set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"

# Statusline

# Statusline - current window
set -g window-status-current-style "fg=${thm_blue},bg=${thm_bg},bold"
set -g window-status-current-format "(#I)"

# Statusline - other windows
set -g window-status-style "fg=${thm_magenta},bg=${thm_bg},dim"
set -g window-status-format " #I "

# Statusline - right side
# set -g status-right "#[fg=${thm_fg}]%H:%M #(uptime | awk '{print $1}')"
set -g status-right-style "fg=${thm_blue},bg=${thm_black4}"
set -g status-right "%H:%M"

# Statusline - left side
set -g status-left "#[fg=${thm_blue},bg=${thm_black4}] #S "

# Modes
set -g clock-mode-colour "${thm_blue}"
# set -g mode-style "fg=${thm_blue} bg=${thm_black4} bold"

# }}}

# VIM-TMUX-NAVIGATOR {{{

# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# }}}

# automatically install tpm
if "test ! -d ~/.tmux/plugins/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install-plugins'"

run '~/.tmux/plugins/tpm/tpm'
